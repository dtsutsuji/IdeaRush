<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idea Rush - Timer Editor</title>
    <style>
        /* テーマ: ダークモード & レスポンシブ設計 */
        :root {
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
            --accent-color: #007acc;
            --sec-accent-color:  #555;
            --danger-color: #d16d71;
            --input-bg: #2d2d2d;
            --border-color: #3e3e42;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 10px 20px;
        }

        /* 1. カウントダウンタイマー表示 */
        #timer-display {
            font-size: 5rem;
            font-weight: bold;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            color: var(--accent-color);
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(0, 122, 204, 0.3);
        }

        /* 2. テーマ用テキストエリア */
        #theme-input {
            width: 100%;
            background-color: transparent;
            border: none;
            border-bottom: 2px solid var(--border-color);
            color: #ffffff;
            font-size: 3rem;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        #theme-input:focus {
            border-bottom-color: var(--accent-color);
        }

        /* 3. & 4. コントロールボタン */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: var(--accent-color);
            color: var(--text-color);
            transition: opacity 0.2s, background-color 0.2s;
        }

        button:hover {
            background-color: var(--border-color);
        }

        .btn-start { background-color: var(--accent-color); color: white; }
        .btn-stop { background-color: var(--danger-color); color: white; }
        .btn-reset { background-color: var(--sec-accent-color); color: white; }

        /* 5. アイディア出し用テキストエリア */
        #idea-editor {
            width: 100%;
            height: 400px;
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            font-size: 1.1rem;
            line-height: 1.6;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
        }
        #idea-editor:focus {
            border-color: var(--accent-color);
        }

        .notion {
          opacity: 0.4;
          font-size: 0.8rem;
          margin: 2px 4px;
        }

        /* アラートの基本スタイル */
        #toast {
          position: fixed;
          bottom: 20px;
          left: 50%;
          transform: translateX(-50%);
          background-color: #333;
          color: #fff;
          padding: 10px 20px;
          border-radius: 5px;
          opacity: 1;
          transition: opacity 0.5s ease-out; /* フェードアウト用 */
          z-index: 1000;
        }

        /* 非表示用クラス */
        #toast.hidden {
          opacity: 0;
          pointer-events: none; /* クリック無効化 */
        }

        /* レスポンシブ調整 */
        @media (max-width: 600px) {
            #timer-display { font-size: 3.5rem; }
            #theme-input { font-size: 2rem; }
            button { flex: 1 1 20%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <button onclick="setTimer(60)">1 min</button>
        <button onclick="setTimer(300)">5 min</button>
        <button onclick="setTimer(600)">10 min</button>
        <button onclick="setTimer(1800)">30 min</button>
    </div>
    
    <div class="controls">
        <button class="btn-stop" onclick="stopTimer()">STOP</button>
        <button class="btn-reset" onclick="resetTimer()">RESET</button>
    </div>

    <div id="timer-display">00:00</div>

    <input type="text" id="theme-input" placeholder="1. ここにテーマを入力..." spellcheck="false">

    <p class="notion">
      テーマに関連する言葉や、テーマを定義する言葉を書き出そう
    </p>
    <textarea id="idea-editor" placeholder="2. タイマーをスタートして、テーマに関するアイディアを書き出しましょう..."></textarea>
    <p class="notion">
    （Alt + ↑↓ で行の入れ替えができます）
    </p>

    <div class="controls">
      <button id="copyBtn" class="btn-reset">ClipBoard</button>
      <button id="mindmapBtn" class="btn-reset">Obsidian MaindMap</button>
    </div>
    <div id="toast" class="hidden" role="alert">コピー成功！</div>
    
</div>

<script>
    let timeLeft = 0;
    let timerId = null;

    const display = document.getElementById('timer-display');
    const editor = document.getElementById('idea-editor');
    const copyBtn = document.getElementById('copyBtn');

    // タイマー表示の更新
    function updateDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        display.textContent = 
            `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        
        
        // 終了時の演出
        if (timeLeft <= 10 && timeLeft >= 0) {
            display.style.color = 'var(--danger-color)';
        } else {
            display.style.color = 'var(--accent-color)';
        }
    }

    // カウントダウン開始
    function setTimer(seconds) {
        clearInterval(timerId);
        timeLeft = seconds;
        updateDisplay();
        startTimer();
    }

    function startTimer() {
        if (timerId) clearInterval(timerId);
        
        timerId = setInterval(() => {
          
            if (timeLeft > 0) {
                timeLeft--;
                updateDisplay();
            } else {
                clearInterval(timerId);
                alert("時間終了です！お疲れ様でした。");
            }
        }, 1000);
    }

    // 停止
    function stopTimer() {
        clearInterval(timerId);
    }

    // リセット
    function resetTimer() {
        clearInterval(timerId);
        timeLeft = 0;
        updateDisplay();
    }

    editor.addEventListener('keydown', (event) => {
      // Altキー以外は何もしない、上下キー以外は何もしない
      if (!event.altKey) return;
      if (event.key !== 'ArrowUp' && event.key !== 'ArrowDown') return;

      // Alt+↑↓の、ブラウザでのデフォルト動作を無効化
      event.preventDefault();
      
      const lines = editor.value.split('\n');
      // 現在のカーソル位置（行頭）を取得
      const selectionStart = editor.selectionStart;
      const currentLineIndex = editor.value.substring(0, selectionStart).split('\n').length - 1;

      let newIndex = currentLineIndex;
      if (event.key === 'ArrowUp' && currentLineIndex > 0) {
        newIndex = currentLineIndex - 1;
      } else if (event.key === 'ArrowDown' && currentLineIndex < lines.length - 1) {
        newIndex = currentLineIndex + 1;
      } else {
        return;
      }

      // 行の入れ替え
      [lines[currentLineIndex], lines[newIndex]] = [lines[newIndex], lines[currentLineIndex]];

      // 再描画
      const newText = lines.join('\n');
      editor.value = newText;

      // 選択範囲位置を調整
      const newSelectionStart = getLineStartPos(newText, newIndex);
      editor.setSelectionRange(newSelectionStart, newSelectionStart);
    })

    // 行の開始位置を取得する関数
    function getLineStartPos(text, lineIndex) {
      const lines = text.split('\n');
      let pos = 0;
      for (let i = 0; i < lineIndex; i++) {
        pos += lines[i].length + 1;
      }
      return pos;
    }
    
    copyBtn.addEventListener('click', () => {
      const textToCopy = editor.value;
      navigator.clipboard.writeText(textToCopy).then(() => {
        alert('コピーしました');
      }).catch(err => {
        console.error('コピー失敗: ', err);
      });
    });
    
    document.getElementById('mindmapBtn').addEventListener('click', () => {
      const theme = document.getElementById('theme-input').value || 'Theme';
      const formatedText = editor.value.replace(/^/gm, '  ');
      const textToCopy = '```mermaid\nmindmap\n)**' + theme + '**(\n' + formatedText + '\n```';
      navigator.clipboard.writeText(textToCopy);
      
      // トーストの非表示・表示
      const toast = document.getElementById('toast');
      toast.classList.remove('hidden');
      
      setTimeout(function() {
        toast.classList.add('hidden');
      }, 2000);
    })

    // ブラウザを閉じる際の警告（簡易保存機能の代わり）
    window.onbeforeunload = function() {
        if (editor.value.length > 0) {
            return "入力中の内容が破棄されますがよろしいですか？";
        }
    };
</script>

</body>
</html>
